<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      padding: 18px 18px 16px;
      width: 280px;
      background: #0f172a;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    }
    h1 { font-size: 15px; margin: 0 0 4px; font-weight: 700; }
    .sub { font-size: 11px; color: #94A3B8; margin-bottom: 14px; }
    .state {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 14px;
      border: 1px solid transparent;
    }
    .state.active {
      background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.2));
      border-color: rgba(139,92,246,.4);
      color: #C7D2FE;
    }
    .state.idle {
      background: rgba(148,163,184,.08);
      border-color: rgba(148,163,184,.15);
      color: #94A3B8;
    }
    .dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle;
    }
    .dot.on { background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: p 1.4s infinite; }
    .dot.off { background: #64748b; }
    @keyframes p { 50% { opacity: .4; } }
    .list {
      background: rgba(0,0,0,.2); border-radius: 8px;
      padding: 10px 12px; font-size: 11px; color: #94A3B8; line-height: 1.7;
    }
    .list b { color: #E2E8F0; }
    a { color: #A78BFA; text-decoration: none; font-size: 12px; display: block; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <h1>🛡️ Focus Guard</h1>
  <div class="sub">Bloqueador de distracciones para MachReach</div>
  <div id="state" class="state idle"><span class="dot off"></span>Inactivo</div>
  <div class="list">
    <b>Bloqueados durante el enfoque:</b> Instagram · TikTok · Twitter/X · Facebook · Reddit · Snapchat · Pinterest · Twitch · Netflix<br>
    <b>Siempre permitidos:</b> YouTube (puede que estés estudiando).
  </div>
  <a href="https://machreach.com/student/focus" target="_blank">Abrir MachReach →</a>
  <script>
    chrome.storage.local.get(["focusActive", "focusExpiresAt"], (d) => {
      const active = d.focusActive && (!d.focusExpiresAt || Date.now() < d.focusExpiresAt);
      const el = document.getElementById("state");
      if (active) {
        el.className = "state active";
        el.innerHTML = '<span class="dot on"></span>Activo — sitios bloqueados';
      } else {
        el.className = "state idle";
        el.innerHTML = '<span class="dot off"></span>Sin sesión activa';
      }
    });
  </script>
</body>
</html>
